<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Reset</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root{
    --primary:#2563eb;
    --primary-dark:#1d4ed8;
    --border:#e5e7eb;
    --text:#0f172a;
    --bg1:#eef2ff;
    --bg2:#ffffff;
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
}

.container{
    max-width:420px;
    margin:90px auto;
}

.card{
    background:#fff;
    padding:36px 32px;
    border-radius:12px;
    box-shadow:0 20px 40px rgba(0,0,0,0.08);
    transition:0.25s;
}

.card:hover{
    transform:translateY(-3px);
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.header i{
    font-size:30px;
    color:var(--primary);
}

.header h2{
    margin-top:10px;
}

/* input */
.input-group{
    position:relative;
}

.input-group i{
    position:absolute;
    top:13px;
    left:12px;
    color:#94a3b8;
}

input{
    width:90%;
    padding:12px 12px 12px 36px;
    margin-bottom:15px;
    border:1px solid var(--border);
    border-radius:6px;
    transition:0.2s;
}

input:focus{
    border-color:var(--primary);
    outline:none;
    box-shadow:0 0 0 3px rgba(37,99,235,0.1);
}

/* button */
button{
    width:100%;
    padding:11px;
    border:none;
    border-radius:6px;
    background:var(--primary);
    color:white;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:var(--primary-dark);
}

button:disabled{
    background:#94a3b8;
}

/* strength */
.strength{
    font-size:12px;
    margin-bottom:10px;
}

/* message */
.message{
    text-align:center;
    margin-bottom:15px;
    font-size:14px;
    padding:10px;
    border-radius:6px;
}

.success{
    background:#dcfce7;
    color:#166534;
}

.error{
    background:#fee2e2;
    color:#7f1d1d;
}

.footer{
    text-align:center;
    margin-top:15px;
}

.footer a{
    color:var(--primary);
    text-decoration:none;
}

.footer a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">
<div class="card">

    <div class="header">
        <i class="fas fa-key"></i>

        {% if token %}
            <h2>Set New Password</h2>
        {% else %}
            <h2>Forgot Password</h2>
        {% endif %}
    </div>

    <!-- FLASH MESSAGE -->
    {% if message %}
        <div class="message success">{{ message }}</div>
    {% endif %}

    

<!-- EMAIL FORM -->
{% if not token %}

<form method="POST" action="/forgot_password" id="emailForm">

    <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" name="email" id="email"
               placeholder="Enter your email" required>
    </div>

    <button type="submit" id="emailBtn">
        Send Reset Link
    </button>

</form>

{% endif %}

    <!-- ============================= -->
    <!-- PASSWORD FORM (STEP 2) -->
    <!-- ============================= -->
    {% if token %}

    <form method="POST" id="passwordForm">

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" id="password"
                   placeholder="Enter new password" required>
        </div>

        <div class="strength" id="strengthText"></div>

        <button type="submit" id="passBtn">
            Reset Password
        </button>

    </form>

    {% endif %}

    <div class="footer">
        <a href="{{ url_for('login') }}">Back to Login</a>
    </div>

</div>
</div>

<script>

// -----------------------------
// EMAIL FORM VALIDATION
// -----------------------------
const emailForm = document.getElementById("emailForm");

if(emailForm){
    emailForm.addEventListener("submit", function(e){

        let email = document.getElementById("email").value;

        if(!email){
            e.preventDefault();
            alert("Email is required");
            return;
        }

        document.getElementById("emailBtn").innerText = "Processing...";
    });
}


// -----------------------------
// PASSWORD FORM VALIDATION
// -----------------------------
const passwordForm = document.getElementById("passwordForm");

if(passwordForm){

    let pass = document.getElementById("password");
    let text = document.getElementById("strengthText");

    pass.addEventListener("input", ()=>{
        let val = pass.value;

        if(val.length < 6){
            text.innerText = "Weak password";
            text.style.color = "red";
        }
        else if(/[A-Z]/.test(val) && /\d/.test(val)){
            text.innerText = "Strong password";
            text.style.color = "green";
        }
        else{
            text.innerText = "Medium password";
            text.style.color = "orange";
        }
    });

    passwordForm.addEventListener("submit", function(e){

        let password = pass.value;

        if(password.length < 6){
            e.preventDefault();
            alert("Password must be at least 6 characters");
            return;
        }

        let btn = document.getElementById("passBtn");
        btn.disabled = true;
        btn.innerText = "Updating...";
    });
}

</script>

</body>
</html>
