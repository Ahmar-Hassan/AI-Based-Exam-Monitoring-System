<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - AI Exam Monitoring</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #1f2937;   /* grey theme same as login */
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* TITLE */
.main-title {
    font-size: 26px;
    font-weight: 700;
    color: #e5e7eb;
    margin-bottom: 20px;
    text-align: center;
}

/* REGISTER BOX */
.container {
    background: #111827;
    padding: 50px;
    border-radius: 18px;
    width: 420px;

    box-sizing: border-box;

    color: white;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    text-align: center;
}

/* HEADING */
h2 {
    margin-bottom: 25px;
    font-weight: 600;
}

/* INPUT BOX */
.input-box {
    position: relative;
    margin: 16px 0;
}

/* INPUT FIX */
input {
    width: 100%;
    padding: 14px 14px 14px 42px;
    border-radius: 12px;
    border: none;
    outline: none;
    background: #374151;
    color: white;
    font-size: 15px;
    box-sizing: border-box;
}

input::placeholder {
    color: #d1d5db;
}

/* ICON INSIDE INPUT */
.input-box i {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #9ca3af;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    background: #34d399;
    border: none;
    color: black;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    font-size: 15px;
    margin-top: 15px;
    transition: 0.2s ease;
}

button:hover {
    background: #10b981;
    transform: translateY(-2px);
}

/* LINK STYLE */
a {
    color: #60a5fa;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

/* ICON HEADER */
.logo {
    font-size: 32px;
    color: #34d399;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<!-- TITLE -->
<div class="main-title">
    <i class="fas fa-user-shield"></i> AI-Based Exam Monitoring System
</div>

<!-- REGISTER BOX -->
<div class="container">

    <div class="logo">
        <i class="fas fa-user-plus"></i>
    </div>

    <h2>Create Account</h2>

    <form method="POST">

        <div class="input-box">
            <i class="fas fa-user"></i>
            <input type="text" name="name" placeholder="Full Name" required>
        </div>

        <div class="input-box">
            <i class="fas fa-envelope"></i>
            <input type="email" name="email" placeholder="Email" required>
        </div>

        <div class="input-box">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit">
            <i class="fas fa-user-check"></i> Register
        </button>
    </form>

    <p style="margin-top:18px;">
        Already have an account?
        <a href="/login">Login</a>
    </p>

</div>

</body>
</html>
